# Supabase CLI 設定ファイル
# 詳細: https://supabase.com/docs/guides/cli/config
#
# このファイルはリポジトリにコミットします。
# project_id などの機密情報は .env.local に記載し gitignore してください。

[project]
# supabase link --project-ref <ref> で設定される
# project_id = "plytrwrjwjquvcgsppbt"

[api]
# ローカル開発用ポート（supabase start 使用時のみ有効）
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
# ローカル開発用ポート（supabase start 使用時のみ有効）
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
# JWT の有効期限（秒）
jwt_expiry = 3600
# リフレッシュトークンの再利用を防ぐ
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
# メール確認を必須にする（本番環境推奨）
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false  # 開発中は false、本番では true に変更

[edge_runtime]
# Edge Functions は使用しない方針のため無効化
enabled = false
