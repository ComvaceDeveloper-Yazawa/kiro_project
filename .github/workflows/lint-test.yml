name: Lint & Test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (shared)
        run: pnpm --filter @monorepo/shared lint

      - name: Lint (backend)
        run: pnpm --filter @monorepo/backend lint

      - name: Lint (frontend)
        run: pnpm --filter @monorepo/frontend lint

      - name: Test (shared)
        run: pnpm --filter @monorepo/shared test

      - name: Test (backend)
        run: pnpm --filter @monorepo/backend test

      - name: Test (frontend)
        run: pnpm --filter @monorepo/frontend test

      - name: Build (shared)
        run: pnpm --filter @monorepo/shared build

      - name: Build (backend)
        run: pnpm --filter @monorepo/backend build

      - name: Build (frontend)
        run: pnpm --filter @monorepo/frontend build
